<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Platformer + Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }

        /* CHAT UI */
        #chatBox {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 300px;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-size: 14px;
        }

        #chatInput {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 300px;
            padding: 6px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>

<div id="chatBox"></div>
<input id="chatInput" placeholder="Type message..." />

<script>
/* -------------------------------------------------------
   MAP DATA
------------------------------------------------------- */
const MAP = [
    { x: 1500, y: 11980, w: 3000, h: 40, color: 0x228B22 },
    { x: 500,  y: 11500, w: 300, h: 40, color: 0x8B4513 },
    { x: 2000, y: 11200, w: 300, h: 40, color: 0x8B4513 },
    { x: 1200, y: 10800, w: 300, h: 40, color: 0x8B4513 },
    { x: 800,  y: 10400, w: 300, h: 40, color: 0x8B4513 },
    { x: 1800, y: 10000, w: 300, h: 40, color: 0x8B4513 },
    { x: 1000, y: 9600,  w: 300, h: 40, color: 0x8B4513 },
    { x: 2200, y: 9200,  w: 300, h: 40, color: 0x8B4513 },
    { x: 600,  y: 8800,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1500, y: 8400,  w: 300, h: 40, color: 0x8B4513 },
    { x: 900,  y: 8000,  w: 300, h: 40, color: 0x8B4513 },
    { x: 2000, y: 7600,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1300, y: 7200,  w: 300, h: 40, color: 0x8B4513 },
    { x: 700,  y: 6800,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1700, y: 6400,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1100, y: 6000,  w: 300, h: 40, color: 0x8B4513 },
    { x: 500,  y: 5600,  w: 300, h: 40, color: 0x8B4513 },
    { x: 2000, y: 5200,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1400, y: 4800,  w: 300, h: 40, color: 0x8B4513 },
    { x: 800,  y: 4400,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1800, y: 4000,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1000, y: 3600,  w: 300, h: 40, color: 0x8B4513 },
    { x: 2200, y: 3200,  w: 300, h: 40, color: 0x8B4513 },
    { x: 600,  y: 2800,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1500, y: 2400,  w: 300, h: 40, color: 0x8B4513 },
    { x: 900,  y: 2000,  w: 300, h: 40, color: 0x8B4513 },
    { x: 2000, y: 1600,  w: 300, h: 40, color: 0x8B4513 },
    { x: 1300, y: 1200,  w: 300, h: 40, color: 0x8B4513 },
    { x: 700,  y: 800,   w: 300, h: 40, color: 0x8B4513 },
    { x: 1700, y: 400,   w: 300, h: 40, color: 0x8B4513 },

    { x: 1500, y: 150, w: 600, h: 40, color: 0x00ff00 }
];

/* -------------------------------------------------------
   PLATFORM CREATOR
------------------------------------------------------- */
function createPlatform(scene, obj) {
    const rect = scene.add.rectangle(obj.x, obj.y, obj.w, obj.h, obj.color);
    scene.matter.add.gameObject(rect, { isStatic: true });
}

/* -------------------------------------------------------
   PLATFORMER SCENE
------------------------------------------------------- */
class PlatformerScene extends Phaser.Scene {
    constructor() {
        super("PlatformerScene");
    }

    preload() {
        this.textures.generate("player", { data:["2"], pixelWidth:32, pixelHeight:32 });
    }

    create() {
        this.worldWidth = 3000;
        this.worldHeight = 20000;

        this.cameras.main.setBounds(0, 0, this.worldWidth, this.worldHeight);
        this.matter.world.setBounds(0, 0, this.worldWidth, this.worldHeight);

        MAP.forEach(obj => createPlatform(this, obj));

        this.createPlayer();
        this.createControls();

        setupChat();
    }

    createPlayer() {
        const sprite = this.add.rectangle(1500, 18000, 40, 40, 0xffffff);
        this.player = this.matter.add.gameObject(sprite, { shape: "rectangle" });

        this.player.setFixedRotation();
        this.player.setFriction(0.001);
        this.player.setFrictionAir(0.02);

        this.playerSpeed = 6;
        this.jumpVelocity = -10;

        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
    }

    createControls() {
        this.keys = this.input.keyboard.addKeys("W,A,S,D,ENTER");
    }

    update() {
        this.updatePlayerMovement();
    }

    updatePlayerMovement() {
        const body = this.player.body;
        const onGround = Math.abs(body.velocity.y) < 0.01;

        if (this.keys.A.isDown) this.player.setVelocityX(-this.playerSpeed);
        else if (this.keys.D.isDown) this.player.setVelocityX(this.playerSpeed);
        else this.player.setVelocityX(0);

        if (Phaser.Input.Keyboard.JustDown(this.keys.W) && onGround)
            this.player.setVelocityY(this.jumpVelocity);
    }
}

/* -------------------------------------------------------
   CHAT SYSTEM
------------------------------------------------------- */
const socket = io();
const chatBox = document.getElementById("chatBox");
const chatInput = document.getElementById("chatInput");

function setupChat() {
    window.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            if (chatInput.style.display === "none") {
                chatInput.style.display = "block";
                chatInput.focus();
            } else {
                const msg = chatInput.value.trim();
                if (msg.length > 0) socket.emit("chatMessage", msg);
                chatInput.value = "";
                chatInput.style.display = "none";
            }
        }
    });

    socket.on("chatMessage", data => {
        const div = document.createElement("div");
        div.textContent = data.id + ": " + data.text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

/* -------------------------------------------------------
   GAME CONFIG
------------------------------------------------------- */
new Phaser.Game({
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.RESIZE, width: "100%", height: "100%" },
    backgroundColor: "#87CEEB",
    physics: {
        default: "matter",
        matter: { gravity: { y: 1 }, debug: true }
    },
    scene: PlatformerScene
});
</script>

</body>
</html>
